# Netlify-Konfiguration für den Vokabeltrainer
# Reines statisches HTML aus der Repo-Wurzel + Serverless-Function zum Eintragen.
[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

# Die App-Datei (index.html) NIE hart cachen: iPhone-Home-Screen-Apps halten sonst
# hartnäckig die alte Fassung fest → neue Vokabeln erscheinen nicht. "must-revalidate"
# zwingt das Handy, bei jedem Öffnen kurz beim Server nachzufragen "gibt's was Neues?".
# Unverändert = 304 (blitzschnell, aus dem Cache). Verändert = frische Fassung.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Die App liest diese beiden Dateien live aus, um anzuzeigen, wie viele Wörter noch
# auf den Nachtlauf warten. Gecacht wären die Zahlen falsch — also auch hier revalidieren.
[[headers]]
  for = "/inbox.txt"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/verarbeitet.txt"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
